<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMXHERO | Pro Tools</title>
    <link rel="icon" href="logo.ico">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #0d6efd;
            --success: #12b886;
            --danger: #fa5252;
            --bg: #1a1b1e;
            --card: #25262b;
            --border: #373a40;
            --text: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

        /* شاشة الدخول */
        #authOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .auth-card { background: var(--card); width: 100%; max-width: 400px; padding: 30px; border-radius: 20px; border: 1px solid var(--border); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        header { width: 100%; background: var(--card); padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 800; font-size: 20px; text-decoration: none; color: #fff; }
        .points-badge { background: rgba(18, 184, 134, 0.1); color: var(--success); padding: 5px 15px; border-radius: 50px; border: 1px solid var(--success); font-weight: 700; font-size: 14px; }

        .container { width: 100%; max-width: 800px; margin: 20px auto; padding: 0 20px; flex: 1; display: none; }
        .tab-content { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }

        .form-control { width: 100%; margin-bottom: 15px; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: #141517; color: #fff; font-size: 14px; outline: none; }
        .btn-main { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: 0.3s; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #222; color: white; padding: 10px 25px; border-radius: 50px; display: none; z-index: 10000; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card">
        <h2 style="margin-bottom: 15px;">SMMXHERO Tools</h2>
        <input type="email" id="email" class="form-control" placeholder="البريد الإلكتروني">
        <input type="password" id="password" class="form-control" placeholder="كلمة المرور">
        <button class="btn-main" onclick="handleAuth('login')">تسجيل الدخول</button>
        <button class="btn-main" style="background: transparent; border: 1px solid var(--border); margin-top: 10px;" onclick="handleAuth('register')">إنشاء حساب جديد (5 نقاط هدية)</button>
        <div id="authMsg" style="font-size: 11px; margin-top: 10px; color: var(--danger);"></div>
    </div>
</div>

<header id="mainHeader" style="display: none;">
    <div class="logo">SMMX<b>HERO</b></div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="points-badge">💰 <span id="pointsBalance">0</span> نقطة</div>
        <button onclick="logout()" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:700;">خروج</button>
    </div>
</header>

<div class="container" id="mainDashboard">
    <div class="tab-content">
        <div style="display: flex; gap: 10px;">
            <input type="text" id="svcId" class="form-control" placeholder="رقم الخدمة">
            <input type="number" id="qtyId" class="form-control" placeholder="الكمية">
        </div>
        <textarea id="linksInput" class="form-control" rows="6" placeholder="ضع الروابط هنا..."></textarea>
        <button class="btn-main" onclick="runTool()">⚡ تنفيذ (تكلفة 1 نقطة)</button>
        <textarea id="resultOutput" class="form-control" rows="5" readonly style="margin-top: 15px;" placeholder="النتيجة..."></textarea>
        <button class="btn-main" style="background:var(--success); margin-top: 10px;" onclick="copyRes()">📋 نسخ</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyAHpvaYETnzzjmT9VsM96vhhXd3uBaRE70",
        authDomain: "smmxhero-tools.firebaseapp.com",
        projectId: "smmxhero-tools",
        storageBucket: "smmxhero-tools.firebasestorage.app",
        messagingSenderId: "804221596907",
        appId: "1:804221596907:web:7cbe55a26d0544fd5cbaae"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUserData = null;

    function handleAuth(type) {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(!email || !pass) return alert("أكمل البيانات");

        if(type === 'register') {
            auth.createUserWithEmailAndPassword(email, pass).then(cred => {
                return db.collection('users').doc(cred.user.uid).set({ points: 5 });
            }).catch(err => alert(err.message));
        } else {
            auth.signInWithEmailAndPassword(email, pass).catch(err => alert("خطأ في الدخول"));
        }
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'flex';
            document.getElementById('mainDashboard').style.display = 'block';
            db.collection('users').doc(user.uid).onSnapshot(doc => {
                currentUserData = doc.data();
                document.getElementById('pointsBalance').innerText = currentUserData.points;
            });
        } else {
            document.getElementById('authOverlay').style.display = 'flex';
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'none';
        }
    });

    async function runTool() {
        if(!currentUserData || currentUserData.points < 1) return alert("نقاطك انتهت!");
        const sid = document.getElementById('svcId').value;
        const qty = document.getElementById('qtyId').value;
        const links = document.getElementById('linksInput').value.trim();
        if(!sid || !qty || !links) return alert("أكمل البيانات");

        await db.collection('users').doc(auth.currentUser.uid).update({ points: currentUserData.points - 1 });

        let res = "";
        links.split('\n').forEach(l => { if(l.trim()) res += `${sid} | ${l.trim()} | ${qty}\n`; });
        document.getElementById('resultOutput').value = res.trim();
        showToast("تم الخصم والتنسيق ✅");
    }

    function logout() { auth.signOut(); }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
    function copyRes() { const o = document.getElementById('resultOutput'); o.select(); document.execCommand('copy'); showToast("تم النسخ ✅"); }
</script>
</body>
</html>
